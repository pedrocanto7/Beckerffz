<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BECKERFFZ V55 - EXTREME PRECISION</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #ffca28; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center; margin: 0; padding: 12px; 
            border: 1px solid #ffca28; border-radius: 20px; 
            display: flex; flex-direction: column; height: 100vh;
            justify-content: center; align-items: center;
            overflow: hidden;
        }
        #login-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .login-title { color: #fff; font-size: 24px; letter-spacing: 2px; text-shadow: 0 0 10px #ffca28; margin: 0; }
        .login-input { background: #050505; border: 1px solid #ffca28; border-radius: 10px; color: #fff; padding: 15px; width: 85%; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; }
        .login-btn { background: #ffca28; color: #000; border: none; padding: 15px 45px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px #ffca28; cursor: pointer; }
        
        #main-panel { display: none; flex-direction: column; height: 100%; width: 100%; }
        h1 { color: #fff; font-size: 22px; letter-spacing: 2px; text-shadow: 0 0 10px #ffca28; margin: 15px 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .painel-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 75px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #222; }
        .nav-btn { background: #000; color: #444; border: 1px solid #111; padding: 12px 5px; margin: 10px 0; border-radius: 10px; font-size: 11px; width: 60px; text-align: center; cursor: pointer; }
        .nav-btn.active { color: #ffca28; border: 1px solid #ffca28; box-shadow: 0 0 10px #ffca28; }
        .main-content { flex: 1; padding-left: 15px; display: flex; flex-direction: column; position: relative; overflow-y: auto; }
        .tab-content { display: none; flex-direction: column; width: 100%; }
        .tab-content.active { display: flex; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .check-btn { background: #050505; color: #ffca28; border: 1px solid #1a1a1a; padding: 15px 10px; border-radius: 10px; font-size: 11px; text-align: left; position: relative; font-weight: 500; cursor: pointer; }
        .check-btn.checked { border: 1px solid #ffca28; box-shadow: 0 0 8px #ffca28; }
        .check-btn.checked::after { content: '✓'; position: absolute; right: 5px; color: #0f0; }
        .slider-group { background: #050505; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
        .slider-label { font-size: 13px; color: #ffca28; margin-bottom: 10px; display: block; text-align: left; }
        .fov-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #222; border-radius: 3px; }
        .fov-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #ffca28; border-radius: 50%; box-shadow: 0 0 8px #ffca28; cursor: pointer;}
        .target-select { background: #050505; color: #fff; border: 1px solid #1a1a1a; width: 100%; padding: 15px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; font-weight: bold; text-align: center; cursor: pointer; }
        #target-menu { display: none; background: #111; border: 1px solid #ffca28; border-radius: 12px; margin-bottom: 10px; width: 100%; }
        .option { padding: 15px; border-bottom: 1px solid #222; color: #fff; cursor: pointer; }
        .inject-btn { background: #ffca28; color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; box-shadow: 0 0 15px #ffca28; margin-top: 5px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <p class="login-title">BECKERFFZ LOGIN</p>
        <input type="password" id="pass-input" class="login-input" placeholder="Senha">
        <button class="login-btn" onclick="checkAuth()">ENTRAR</button>
    </div>

    <div id="main-panel">
        <h1>BECKERFFZ V55</h1>
        <div class="painel-container">
            <div class="sidebar">
                <div id="nav-aim" class="nav-btn active" onclick="openTab('aimbot', this)">aimbot</div>
                <div id="nav-fps" class="nav-btn" onclick="openTab('fps', this)">fps</div>
            </div>

            <div class="main-content">
                <div id="aimbot" class="tab-content active">
                    <div class="checkbox-grid">
                        <div id="f-auxilio" class="check-btn" onclick="toggle(this)">Auxílio</div>
                        <div id="f-headtrick" class="check-btn" onclick="toggle(this)">Headtrick</div>
                        <div id="f-precisao" class="check-btn" onclick="toggle(this)">Precisão</div>
                        <div id="f-regedit" class="check-btn" onclick="toggle(this)">Regedit</div>
                    </div>
                    <div class="slider-group">
                        <span id="label-precisao" class="slider-label">Ajuste Precisão - 1</span>
                        <input type="range" id="sensi-val" min="1" max="10" value="1" class="fov-slider" oninput="updateSensi(this.value)">
                    </div>
                    <div id="target-display" class="target-select" onclick="toggleMenu()">Cabeça</div>
                    <div id="target-menu">
                        <div class="option" onclick="selectTarget('Cabeça')">Cabeça</div>
                        <div class="option" onclick="selectTarget('Pescoço')">Pescoço</div>
                        <div class="option" onclick="selectTarget('Peito')">Peito</div>
                    </div>
                    <button class="inject-btn" onclick="injetarEabrir()">INJETAR E ABRIR FF</button>
                </div>

                <div id="fps" class="tab-content">
                    <div class="checkbox-grid" style="grid-template-columns: 1fr;">
                        <div id="f-fluidez" class="check-btn" onclick="toggle(this)">Aumentar fluidez</div>
                        <div id="f-120fps" class="check-btn" onclick="toggle(this)">Forçar 120 Fps</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            if (document.getElementById('pass-input').value === "777") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
            }
        }

        function toggle(el) { el.classList.toggle('checked'); }
        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
        function updateSensi(val) { document.getElementById('label-precisao').innerText = 'Ajuste Precisão - ' + val; }
        function toggleMenu() {
            let menu = document.getElementById('target-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        let currentTarget = "Cabeça";
        function selectTarget(target) {
            currentTarget = target;
            document.getElementById('target-display').innerText = target;
            toggleMenu();
        }

        function injetarEabrir() {
            let status = [];
            // Lógica funcional das flags
            if(document.getElementById('f-headtrick').classList.contains('checked')) status.push("Anti-Pinar: ATIVADO");
            if(document.getElementById('f-auxilio').classList.contains('checked')) status.push("Aimbot: LOCK-ON");
            if(document.getElementById('f-precisao').classList.contains('checked')) status.push("No-Spread: ATIVADO");
            if(document.getElementById('f-regedit').classList.contains('checked')) status.push("Regedit: SENS-FIX");

            let log = "BECKERFFZ V55 INJECTOR\n-----------------------\n";
            log += "ALVO FIXADO: " + currentTarget + "\n";
            log += "LIMITADOR VERTICAL: " + (currentTarget === "Cabeça" ? "BLOQUEAR ACIMA DA TESTA" : currentTarget === "Pescoço" ? "BLOQUEAR ACIMA DO PESCOÇO" : "FOCO CENTRAL PEITO") + "\n";
            log += "STATUS: " + (status.length > 0 ? "FUNÇÕES SINCRONIZADAS" : "PADRÃO") + "\n\nABRINDO O JOGO...";

            alert(log);

            setTimeout(() => {
                window.location.href = "freefire://";
                setTimeout(() => {
                    window.location.href = "intent://#Intent;package=com.dts.freefireth;scheme=freefire;end";
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
