<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BECKER HUB - IOS REGEDIT</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00;
            text-align: center;
            width: 320px;
            z-index: 1;
        }

        h1 {
            font-size: 24px;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 20px;
        }

        input {
            background: #111;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            width: 90%;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
            transform: scale(1.02);
        }

        #panel {
            display: none;
            margin-top: 10px;
        }

        .dns-box {
            background: #111;
            border: 1px dashed #ff00ff;
            padding: 10px;
            margin-top: 15px;
            font-size: 14px;
            color: #ff00ff;
            border-radius: 8px;
            box-shadow: 0 0 5px #ff00ff;
        }

        .status {
            font-size: 11px;
            margin-top: 15px;
            color: #888;
            font-style: italic;
        }

        .option-list {
            margin-top: 15px; 
            text-align: left; 
            font-size: 13px;
            border-left: 2px solid #ff00ff;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BECKER HUB V2</h1>
    
    <div id="login-section">
        <input type="password" id="pass" placeholder="INSIRA A SENHA">
        <button onclick="checkLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="panel">
        <h2 style="color: #ff00ff; text-shadow: 0 0 5px #ff00ff;">PAINEL ATIVO</h2>
        
        <div class="dns-box">
            <strong>DNS ANTI-TREMOR (IOS)</strong><br>
            Primário: 1.1.1.1<br>
            Secundário: 1.0.0.1
        </div>

        <div class="option-list">
            <p>✅ NO SPREAD ATIVADO</p>
            <p>✅ CURSOR MÓVEL: 120</p>
            <p>✅ ESTABILIZADOR: 100%</p>
        </div>

        <button onclick="activateAndOpen()" style="background: #ff00ff; margin-top: 15px; color: white;">INJETAR CONFIGS</button>
        <p class="status" id="status-msg">Aguardando injeção...</p>
    </div>
</div>

<script>
    function checkLogin() {
        const pass = document.getElementById('pass').value;
        if (pass === "777") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
        } else {
            alert("SENHA INCORRETA!");
        }
    }

    function activateAndOpen() {
        const msg = document.getElementById('status-msg');
        msg.innerHTML = "INJETANDO BYPASS...";
        msg.style.color = "#ff00ff";
        
        setTimeout(() => {
            msg.innerHTML = "SUCESSO! ABRINDO FREE FIRE...";
            msg.style.color = "#00ff00";
            
            // Comando para abrir o Free Fire (Funciona em iOS e Android)
            setTimeout(() => {
                window.location.href = "freefire://";
                
                // Backup caso o link direto falhe em alguns navegadores
                setTimeout(() => {
                    window.location.href = "com.dts.freefireth://";
                }, 500);
            }, 1000);
            
        }, 2000);
    }
</script>

</body>
</html>
