<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BECKERFFZ V55</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; 
            color: #ffca28; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            justify-content: center; 
            align-items: center;
            border: 2px solid #ffca28;
            border-radius: 20px;
            overflow: hidden;
        }

        /* Login */
        #login-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .login-title { color: #fff; font-size: 26px; letter-spacing: 3px; text-shadow: 0 0 15px #ffca28; margin-bottom: 5px; }
        .login-input { 
            background: #0a0a0a; border: 1px solid #ffca28; border-radius: 12px; 
            color: #fff; padding: 15px; width: 80%; font-size: 18px; 
            text-align: center; margin-bottom: 20px; box-shadow: inset 0 0 5px #ffca28;
        }
        .login-btn { 
            background: #ffca28; color: #000; border: none; padding: 15px 50px; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 0 15px #ffca28; transition: 0.3s;
        }

        /* Main Panel */
        #main-panel { display: none; flex-direction: column; width: 100%; height: 100%; }
        h1 { color: #fff; font-size: 22px; text-shadow: 0 0 10px #ffca28; margin: 10px 0; }

        .painel-container { display: flex; flex: 1; border-top: 1px solid #222; }
        
        .sidebar { width: 80px; display: flex; flex-direction: column; align-items: center; padding-top: 10px; border-right: 1px solid #222; }
        .nav-btn { 
            background: transparent; color: #555; border: 1px solid #111; padding: 15px 5px; 
            margin-bottom: 15px; border-radius: 12px; font-size: 11px; width: 65px; cursor: pointer;
        }
        .nav-btn.active { color: #ffca28; border: 1px solid #ffca28; box-shadow: 0 0 10px #ffca28; }

        .main-content { flex: 1; padding: 15px; overflow-y: auto; }
        .tab-content { display: none; flex-direction: column; }
        .tab-content.active { display: flex; }

        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-btn { 
            background: #050505; color: #ffca28; border: 1px solid #1a1a1a; 
            padding: 15px 10px; border-radius: 10px; font-size: 12px; text-align: center; cursor: pointer;
        }
        .check-btn.checked { border: 1px solid #ffca28; box-shadow: 0 0 8px #ffca28; color: #fff; }

        .slider-group { background: #050505; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #111; }
        .fov-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 5px; }
        .fov-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #ffca28; border-radius: 50%; box-shadow: 0 0 5px #ffca28; }

        .inject-btn { 
            background: #ffca28; color: #000; border: none; width: 100%; 
            padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 20px #ffca28; margin-top: auto;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <p class="login-title">BECKERFFZ</p>
        <p style="color:#666; font-size: 12px; margin-bottom: 20px;">SECURITY BYPASS V55</p>
        <input type="password" id="pass-input" class="login-input" placeholder="SENHA DE ACESSO">
        <button class="login-btn" onclick="checkAuth()">ACESSAR PAINEL</button>
    </div>

    <div id="main-panel">
        <h1>BECKERFFZ PREMIUM</h1>
        
        <div class="painel-container">
            <div class="sidebar">
                <div id="nav-aim" class="nav-btn active" onclick="openTab('aimbot', this)">AIMBOT</div>
                <div id="nav-fps" class="nav-btn" onclick="openTab('fps', this)">FPS</div>
            </div>

            <div class="main-content">
                <div id="aimbot" class="tab-content active">
                    <div class="checkbox-grid">
                        <div class="check-btn" onclick="toggle(this)">Auxílio</div>
                        <div class="check-btn" onclick="toggle(this)">Headtrick</div>
                        <div class="check-btn" onclick="toggle(this)">Precisão</div>
                        <div class="check-btn" onclick="toggle(this)">Regedit</div>
                    </div>
                    <div class="slider-group">
                        <label id="label-precisao" style="font-size: 12px; display: block; margin-bottom: 10px;">Precisão: 1</label>
                        <input type="range" min="1" max="10" value="1" class="fov-slider" oninput="updateSensi(this.value)">
                    </div>
                    <button class="inject-btn" onclick="injetarEbrir('AIMBOT')">INJETAR E ABRIR FF</button>
                </div>

                <div id="fps" class="tab-content">
                    <div class="checkbox-grid" style="grid-template-columns: 1fr;">
                        <div class="check-btn" onclick="toggle(this)" style="margin-bottom: 5px;">Aumentar Contraste</div>
                        <div class="check-btn" onclick="toggle(this)" style="margin-bottom: 5px;">Aumentar Fluidez</div>
                        <div class="check-btn" onclick="toggle(this)" style="margin-bottom: 5px;">Forçar 120 FPS</div>
                    </div>
                    <button class="inject-btn" onclick="injetarEbrir('FPS')">OTIMIZAR E ABRIR FF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função de Login
        function checkAuth() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "777") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
            } else {
                alert("Acesso Negado!");
            }
        }

        // Seleção de botões
        function toggle(el) { el.classList.toggle('checked'); }

        // Troca de abas
        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Atualiza label do slider
        function updateSensi(val) { document.getElementById('label-precisao').innerText = 'Precisão: ' + val; }

        // --- FUNÇÃO DE INJEÇÃO + ABRIR JOGO ---
        function injetarEbrir(tipo) {
            // Simula processo de injeção
            alert("BECKERFFZ: Injetando " + tipo + "... Aguarde.");
            
            setTimeout(() => {
                alert("Sucesso! Abrindo o Free Fire...");
                
                // Comando para abrir o Free Fire (Deep Link)
                // Funciona na maioria dos Androids e iOS que possuem o jogo instalado
                window.location.href = "freefire://";
                
                // Caso o link acima falhe em alguns navegadores, tentamos o Intent (Android)
                setTimeout(() => {
                    window.location.href = "intent://#Intent;package=com.dts.freefireth;scheme=freefire;end";
                }, 500);
            }, 1000);
        }
    </script>
</body>
</html>
